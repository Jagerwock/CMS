<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaBuilder CMS Platform</title>
    <meta
      name="description"
      content="Plataforma SaaS web builder para gestionar sitios, páginas, secciones y bloques con renderizado dinámico basado en JSON." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="platform-shell">
      <aside class="sidebar">
        <div>
          <div class="brand">
            <div class="brand-mark">NB</div>
            <div>
              <h1>NovaBuilder</h1>
            </div>
          </div>

          <nav class="menu" id="mainMenu">
            <button class="menu-item active" data-tab="dashboard">Dashboard</button>
            <button class="menu-item" data-tab="pages">Gestor de páginas</button>
            <button class="menu-item" data-tab="builder">Builder estructural</button>
            <button class="menu-item" data-tab="library">Biblioteca</button>
            <button class="menu-item" data-tab="seo">SEO</button>
          </nav>
        </div>

        <div class="sidebar-bottom">
          <button class="menu-item utility-item" data-tab="settings">
            <span class="utility-icon">⚙</span>
            <span>Settings</span>
          </button>
          <button class="menu-item utility-item" type="button">
            <span class="utility-icon">↪</span>
            <span>Log Out</span>
          </button>
        </div>
      </aside>

      <main class="workspace-shell">
        <header class="topbar">
          <h2>NovaBuilder Demo Site</h2>
          <div class="topbar-controls">
            <div class="site-status-wrap">
              <span>Estado del sitio:</span>
              <span id="siteStatusChip" class="status-pill"></span>
            </div>
            <button class="moon-btn" type="button">◔</button>
            <span id="pagesChip" class="hidden"></span>
          </div>
        </header>

        <section class="workspace-scroll">
          <section id="dashboardTab" class="tab-panel"></section>
          <section id="pagesTab" class="tab-panel hidden"></section>
          <section id="builderTab" class="tab-panel hidden"></section>
          <section id="libraryTab" class="tab-panel hidden"></section>
          <section id="settingsTab" class="tab-panel hidden"></section>
          <section id="seoTab" class="tab-panel hidden"></section>
        </section>
      </main>
    </div>
  </body>
</html>
