<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaBuilder CMS Platform</title>
    <meta
      name="description"
      content="Plataforma SaaS web builder para gestionar sitios, páginas, secciones y bloques con renderizado dinámico basado en JSON." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="platform-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">NB</div>
          <div>
            <h1>NovaBuilder</h1>
            <p>Visual CMS Platform</p>
          </div>
        </div>

        <nav class="menu" id="mainMenu">
          <button class="menu-item active" data-tab="dashboard">Dashboard</button>
          <button class="menu-item" data-tab="pages">Gestor de páginas</button>
          <button class="menu-item" data-tab="builder">Builder estructural</button>
          <button class="menu-item" data-tab="library">Biblioteca</button>
          <button class="menu-item" data-tab="settings">Settings</button>
          <button class="menu-item" data-tab="seo">SEO</button>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar card">
          <div>
            <p class="eyebrow">SaaS Website Builder</p>
            <h2>Plataforma CMS visual para construir, organizar y publicar páginas web</h2>
          </div>
          <div class="chip-row">
            <span id="siteStatusChip" class="chip"></span>
            <span id="pagesChip" class="chip"></span>
          </div>
        </header>

        <section id="dashboardTab" class="tab-panel"></section>
        <section id="pagesTab" class="tab-panel hidden"></section>
        <section id="builderTab" class="tab-panel hidden"></section>
        <section id="libraryTab" class="tab-panel hidden"></section>
        <section id="settingsTab" class="tab-panel hidden"></section>
        <section id="seoTab" class="tab-panel hidden"></section>
      </main>
    </div>
  </body>
</html>
