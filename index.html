<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DealTracker</title>
    <meta
      name="description"
      content="DealTracker helps freelancers manage clients, projects, payments, and financial metrics in guest or account mode." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <section id="authView" class="auth-shell hidden"></section>

    <section id="appView" class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">DT</div>
          <div>
            <h1>DealTracker</h1>
            <p>Freelance Revenue OS</p>
          </div>
        </div>

        <nav class="menu">
          <button class="menu-item active" data-tab="dashboard">Dashboard</button>
          <button class="menu-item" data-tab="clients">Clients</button>
          <button class="menu-item" data-tab="projects">Projects</button>
          <button class="menu-item" data-tab="payments">Payments</button>
          <button class="menu-item" data-tab="exports">Exports</button>
        </nav>
      </aside>

      <main class="workspace">
        <header class="topbar card">
          <div>
            <p class="eyebrow">Welcome back</p>
            <h2>Manage your freelance work in one place</h2>
          </div>
          <div class="topbar-actions">
            <span id="accountChip" class="account-chip"></span>
            <button id="authPortalBtn" class="btn primary">Sign in</button>
            <button id="signOutBtn" class="btn ghost">Sign out</button>
          </div>
        </header>

        <div id="guestBanner"></div>

        <section class="tab-panel" id="dashboardTab"></section>
        <section class="tab-panel hidden" id="clientsTab"></section>
        <section class="tab-panel hidden" id="projectsTab"></section>
        <section class="tab-panel hidden" id="paymentsTab"></section>
        <section class="tab-panel hidden" id="exportsTab"></section>
      </main>
    </section>
  </body>
</html>
